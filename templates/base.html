<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Projeto Flask</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        nav {
            background: #1e293b;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .links a {
            color: #38bdf8;
            text-decoration: none;
            margin-right: 15px;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }
    </style>
</head>
<body>

<nav>
    <div class="links">
        <a href="/">Home</a>
        <a href="/dashboard">Dashboard</a>
    </div>

    <div class="links">
        <a href="/login">Login</a>
        <a href="/cadastro">Cadastro</a>
        <a href="/logout">Logout</a>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
